<!-- bgm -->
<audio id="bgmusic" src="bgmusic.wav" loop preload="auto"></audio>
<div id="musicBtn" class="bgmusic_btn_pause" onclick="toggleMusic()"></div>
<script>
var bgm=document.getElementById("bgmusic");
var btn=document.getElementById("musicBtn");
var isP=false;
function toggleMusic(){if(isP){bgm.pause();btn.className="bgmusic_btn_pause";isP=false;}else{bgm.play().then(function(){btn.className="bgmusic_btn_play";isP=true;}).catch(function(){})}}
function tryPlay(){bgm.play().then(function(){btn.className="bgmusic_btn_play";isP=true;}).catch(function(){})}
document.addEventListener("click",function(){if(!isP)tryPlay();},{once:true});
if(typeof WeixinJSBridge!="undefined"){WeixinJSBridge.invoke("getNetworkType",{},function(){tryPlay();})}
document.addEventListener("WeixinJSBridgeReady",function(){tryPlay();});
</script>
