<div id="musicBtn" class="bgmusic_btn_pause" onclick="toggleMusic()">&#127925;</div>
<script>
var isP=false,actx,gainNode,loopTimer;
function initA(){try{actx=new(window.AudioContext||window.webkitAudioContext)();gainNode=actx.createGain();gainNode.gain.value=0.25;gainNode.connect(actx.destination)}catch(e){}}
var notes=[523,587,659,784,659,587,523,0,494,523,587,659,523,494,440,0];
var durs=[0.4,0.3,0.4,0.6,0.3,0.4,0.5,0.2,0.4,0.3,0.4,0.6,0.3,0.4,0.5,0.2];
function playM(){if(!actx)initA();if(!actx)return;var t=actx.currentTime;for(var i=0;i<notes.length;i++){if(notes[i]==0){t+=durs[i];continue}var osc=actx.createOscillator();osc.type="sine";osc.frequency.value=notes[i];var g=actx.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.4,t+0.05);g.gain.exponentialRampToValueAtTime(0.001,t+durs[i]-0.05);osc.connect(g);g.connect(gainNode);osc.start(t);osc.stop(t+durs[i]);t+=durs[i]}return t}
function sched(){if(!isP)return;var et=playM();var dur=et-actx.currentTime+0.3;loopTimer=setTimeout(sched,dur*1000)}
function toggleMusic(){var btn=document.getElementById("musicBtn");if(isP){isP=false;clearTimeout(loopTimer);try{actx.suspend()}catch(e){}btn.className="bgmusic_btn_pause"}else{if(!actx)initA();try{actx.resume()}catch(e){}isP=true;sched();btn.className="bgmusic_btn_play"}}
function tryP(){if(!isP)toggleMusic()}
document.addEventListener("click",function(){if(!isP)tryP()},{once:true});
if(typeof WeixinJSBridge!="undefined"){WeixinJSBridge.invoke("getNetworkType",{},function(){tryP()})}
document.addEventListener("WeixinJSBridgeReady",function(){tryP()});
</script>
